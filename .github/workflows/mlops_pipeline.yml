name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  # =====================================================
  # JOB 1 — TEST
  # =====================================================
  test:
    name: Install, Train and Test
    runs-on: ubuntu-latest

    steps:

      - name: Step 1 — Checkout code
        uses: actions/checkout@v4

      - name: Step 2 — Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Step 3 — Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Step 4 — Generate dataset
        run: |
          cd src
          python generate_data.py

      - name: Step 5 — Train model
        run: |
          cd src
          python train.py

      - name: Step 6 — Run tests
        run: |
          pytest tests/test_model.py -v

      - name: Step 7 — Verify model exists
        run: |
          ls models/

  # =====================================================
  # JOB 2 — BUILD AND PUSH TO ECR
  # =====================================================
  build-and-push:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest
    needs: test

    steps:

      - name: Step 1 — Checkout code
        uses: actions/checkout@v4

      - name: Step 2 — Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Step 3 — Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Step 4 — Build Docker image
        run: |
          docker build -t fraud-detection:${{ github.sha }} .

      -  name: Step 5 — Tag Docker image
  run: |
    docker tag fraud-detection:${{ github.sha }} \
    ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

    docker tag fraud-detection:${{ github.sha }} \
    ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Step 6 — Push image to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

  # =====================================================
  # JOB 3 — DEPLOY TO EKS
  # =====================================================
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - name: Step 1 — Checkout code
        uses: actions/checkout@v4

      - name: Step 2 — Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Step 3 — Connect to EKS cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Step 4 — Check deployments
        run: |
          kubectl get deployments

      - name: Step 5 — Update deployment image
        run: |
          kubectl set image deployment/fraud-detection fraud-app=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Step 6 — Wait for rollout
        run: |
          kubectl rollout status deployment/fraud-detection --timeout=5m

      - name: Step 7 — Get service URL
        run: |
          kubectl get services