# k8s/deployment.yml

apiVersion: apps/v1
kind: Deployment

metadata:
  name: fraud-detection
  labels:
    app: fraud-detection

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: fraud-detection

  template:
    metadata:
      labels:
        app: fraud-detection

    spec:
      containers:
        - name: fraud-app

          image: 926028309952.dkr.ecr.ap-south-1.amazonaws.com/fraud-detection-completeprocess:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8501

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"

            limits:
              memory: "512Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service

metadata:
  name: fraud-detection-service

spec:
  type: LoadBalancer

  selector:
    app: fraud-detection

  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501